service: canteen-menu-service

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  region: ap-southeast-1
  stage: ${opt:stage, 'dev'}
  memorySize: 256
  timeout: 29
  environment:
    NODE_ENV: ${opt:stage, 'dev'}
    SERVICE_NAME: menu-service
    # AWS_REGION is injected automatically by Lambda runtime — do not override it here.
    DDB_TABLE_CATALOG_ITEMS: Canteen_Products
    JWT_SECRET: ${env:JWT_SECRET}
    JWT_EXPIRES_IN: ${env:JWT_EXPIRES_IN, '1d'}
    AWS_EVENT_BUS_NAME: ${env:AWS_EVENT_BUS_NAME}
    AWS_EVENT_SOURCE: ${env:AWS_EVENT_SOURCE, 'canteen.menu-service'}
    CORS_ALLOWED_ORIGINS: ${env:CORS_ALLOWED_ORIGINS, '*'}
    CORS_ALLOW_CREDENTIALS: 'false'
    LOG_LEVEL: info
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
            # Required for TransactWriteCommand — separate IAM action from individual write actions
            - dynamodb:TransactWriteItems
          Resource:
            - arn:aws:dynamodb:${self:provider.region}:${aws:accountId}:table/Canteen_Products
            # GSI names match actual DynamoDB table index names
            - arn:aws:dynamodb:${self:provider.region}:${aws:accountId}:table/Canteen_Products/index/CategoryIndex
            - arn:aws:dynamodb:${self:provider.region}:${aws:accountId}:table/Canteen_Products/index/AvailabilityIndex
        - Effect: Allow
          Action:
            - events:PutEvents
          Resource:
            - arn:aws:events:${self:provider.region}:${aws:accountId}:event-bus/*

functions:
  menuApi:
    handler: src/lambda.handler
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY
      - httpApi:
          path: /
          method: ANY

package:
  individually: false
  patterns:
    - '!.git/**'
    - '!.github/**'
    - '!.serverless/**'
    - '!.vscode/**'
    - '!coverage/**'
    - '!docs/**'
    - '!logs/**'
    - '!test/**'
    - '!tests/**'
    - '!**/*.test.js'
    - '!**/*.spec.js'
    - '!**/*.md'
    - '!**/README*'
    - '!**/CHANGELOG*'
    - '!**/LICENSE*'
    - '!node_modules/serverless/**'
    - '!node_modules/serverless-offline/**'
    - '!node_modules/aws-sdk/**'
    - '!node_modules/java-invoke-local/**'
    - '!node_modules/swagger-ui-dist/**'
    - '!node_modules/swagger-ui-express/**'
    - '!node_modules/swagger-jsdoc/**'
    - '!node_modules/bcryptjs/**'
    - '!node_modules/@serverless/**'
    - '!node_modules/@hapi/**'
    - '!node_modules/rxjs/**'
    - '!node_modules/luxon/**'
    - '!node_modules/**/test/**'
    - '!node_modules/**/tests/**'
    - '!node_modules/**/*.test.js'
    - '!node_modules/**/*.spec.js'
    - '!node_modules/**/*.md'
    - '!node_modules/**/README*'
    - '!node_modules/**/CHANGELOG*'
    - '!node_modules/**/LICENSE*'
    - '!node_modules/**/docs/**'
    - '!node_modules/**/examples/**'
    - '!node_modules/**/coverage/**'
    - '!node_modules/**/.github/**'
    - '!node_modules/**/ncjsm/test/**'

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 4001
    noPrependStageInUrl: false
