$kind: http-request
url: "{{baseUrl}}/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "admin@canteen.com",
      "password": "Test@1234"
    }
scripts:
  - type: afterResponse
    code: |-
      const data = pm.response.json().data;
      pm.environment.set('adminToken', data.accessToken);
    language: text/javascript
order: 3000
