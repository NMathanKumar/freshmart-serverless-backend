$kind: http-request
url: "{{baseUrl}}/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "customer@canteen.com",
      "password": "Test@1234"
    }
scripts:
  - type: afterResponse
    code: |-
      const data = pm.response.json().data;
      pm.environment.set('customerToken', data.accessToken);
      pm.environment.set('customerUserId', data.user.userId);
    language: text/javascript
order: 2000
