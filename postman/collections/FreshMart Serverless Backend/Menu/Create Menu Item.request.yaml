$kind: http-request
url: "{{baseUrl}}/menu"
method: POST
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Veg Biryani",
      "description": "Spiced rice with vegetables",
      "category": "Main Course",
      "price": 110,
      "imageUrl": "https://example.com/menu/biryani.jpg",
      "available": true,
      "preparationTime": 20
    }
order: 4000
