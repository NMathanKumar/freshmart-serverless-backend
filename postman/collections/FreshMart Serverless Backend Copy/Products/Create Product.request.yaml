$kind: http-request
url: "{{baseUrl}}/products"
method: POST
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "productName": "Organic Bananas",
      "description": "Fresh bananas sourced from local farms",
      "category": "Fresh Produce",
      "brand": "FreshMart",
      "price": 49.99,
      "images": [
        "https://example.com/products/bananas.png"
      ],
      "available": true,
      "weight": 1,
      "unit": "kg",
      "stock": 200
    }
order: 3000
